<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- Clip everything to the inner circle so lobes don't bleed over the border -->
    <clipPath id="brain-clip">
      <circle cx="150" cy="150" r="132"/>
    </clipPath>
  </defs>

  <!-- White background fill -->
  <circle cx="150" cy="150" r="132" fill="white"/>

  <!-- ═══ CIRCUIT STEMS (drawn BEFORE lobes so lobes mask them naturally) ═══ -->
  <g clip-path="url(#brain-clip)">
    <!-- Brain center divider (top to base) -->
    <line x1="150" y1="40" x2="150" y2="184"
          stroke="black" stroke-width="7" stroke-linecap="round"/>
    <!-- Left stem -->
    <line x1="131" y1="122" x2="131" y2="184"
          stroke="black" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Right stem -->
    <line x1="169" y1="122" x2="169" y2="184"
          stroke="black" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Horizontal T-connector -->
    <line x1="131" y1="122" x2="169" y2="122"
          stroke="black" stroke-width="6.5" stroke-linecap="round"/>
  </g>

  <!-- ═══ BRAIN LOBES (white fill masks stems in overlap zones) ═══ -->
  <g clip-path="url(#brain-clip)">
    <!-- Top-center lobe -->
    <circle cx="150" cy="57"  r="32" fill="white" stroke="black" stroke-width="7"/>
    <!-- Top-left lobe -->
    <circle cx="108" cy="69"  r="29" fill="white" stroke="black" stroke-width="7"/>
    <!-- Top-right lobe -->
    <circle cx="192" cy="69"  r="29" fill="white" stroke="black" stroke-width="7"/>
    <!-- Mid-outer-left lobe -->
    <circle cx="68"  cy="108" r="35" fill="white" stroke="black" stroke-width="7"/>
    <!-- Mid-outer-right lobe -->
    <circle cx="232" cy="108" r="35" fill="white" stroke="black" stroke-width="7"/>
    <!-- Mid-inner-left lobe -->
    <circle cx="111" cy="118" r="29" fill="white" stroke="black" stroke-width="7"/>
    <!-- Mid-inner-right lobe -->
    <circle cx="189" cy="118" r="29" fill="white" stroke="black" stroke-width="7"/>
    <!-- Low-outer-left lobe -->
    <circle cx="74"  cy="155" r="33" fill="white" stroke="black" stroke-width="7"/>
    <!-- Low-outer-right lobe -->
    <circle cx="226" cy="155" r="33" fill="white" stroke="black" stroke-width="7"/>
    <!-- Low-inner-left lobe -->
    <circle cx="118" cy="160" r="23" fill="white" stroke="black" stroke-width="7"/>
    <!-- Low-inner-right lobe -->
    <circle cx="182" cy="160" r="23" fill="white" stroke="black" stroke-width="7"/>
  </g>

  <!-- ═══ WHITE MASK: hide everything below brain base line ═══ -->
  <rect x="0" y="183" width="300" height="120" fill="white"/>

  <!-- ═══ LIGHTBULB BASE ═══ -->
  <!-- Stripe 1 -->
  <rect x="114" y="184" width="72" height="12" rx="6" fill="black"/>
  <!-- Stripe 2 -->
  <rect x="114" y="203" width="72" height="12" rx="6" fill="black"/>
  <!-- Stripe 3 -->
  <rect x="114" y="222" width="72" height="12" rx="6" fill="black"/>
  <!-- Bottom rounded dome cap -->
  <path d="M114 238 Q114 262 150 262 Q186 262 186 238 Z" fill="black"/>

  <!-- ═══ OUTER CIRCLE BORDER (drawn last, always on top) ═══ -->
  <circle cx="150" cy="150" r="138" stroke="black" stroke-width="11" fill="none"/>
</svg>
